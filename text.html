  <!DOCTYPE html>
  <html>
  <head>
    <style>
      /* 元素选择器 - 所有段落变红色 */
      p {
        color: red;
      }

      /* 类选择器 - class="highlight" 的元素变黄底 */
      .highlight {
        background-color: yellow;
      }

      /* ID 选择器 - id="title" 的元素变大 */
      #title {
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <h1 id="title">这是标题</h1>
    <p>这是普通段落</p>
    <p class="highlight">这是高亮段落</p>
    <p>这也是普通段落</p>
  </body>
  </html>
